<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Administrador HEART</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <main class="login-wrap">
        <section class="login-card">
            <div class="login-logo-wrap">
                <img src="/api/logo" alt="Logo HEART" onerror="this.style.display='none'">
            </div>
            <h1>Administrador HEART</h1>
            <p>Ingresa con tu usuario y contrasena para continuar.</p>

            <form method="post" class="login-form">
                <input type="hidden" name="next" value="{{ next_url }}">

                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Contrasena</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                {% if error_message %}
                <p class="feedback">{{ error_message }}</p>
                {% else %}
                <p class="feedback">&nbsp;</p>
                {% endif %}

                <button type="submit" class="btn btn-blue login-btn">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
