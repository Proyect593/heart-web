
<!-- Script de borrado de novedades al final del body para asegurar inicialización -->
<script>
window.addEventListener('DOMContentLoaded', function() {
    const btnBorrarNovedades = document.getElementById('btn-borrar-novedades');
    if (btnBorrarNovedades) {
        // Crear modal de confirmación si no existe
        let modalConfirm = document.getElementById('modal-confirm-borrar');
        if (!modalConfirm) {
            modalConfirm = document.createElement('div');
            modalConfirm.id = 'modal-confirm-borrar';
            modalConfirm.innerHTML = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,20,40,0.45);z-index:3000;display:flex;align-items:center;justify-content:center;">
                    <div style="background:rgba(26,42,79,0.98);border-radius:18px;box-shadow:0 8px 32px 0 #00e6ff55,0 1.5px 0 #00e6ff inset;min-width:320px;max-width:90vw;padding:28px 28px 18px 28px;display:flex;flex-direction:column;align-items:center;">
                        <div style="color:#00e6ff;font-weight:700;font-size:1.1rem;letter-spacing:1px;margin-bottom:12px;">¿Estás seguro de borrar?</div>
                        <div style="display:flex;gap:18px;margin-top:10px;">
                            <button id="btn-confirm-borrar-si" style="padding:8px 24px;border-radius:7px;background:#00e6ff;color:#1a2a4f;font-weight:700;border:none;cursor:pointer;">Sí, borrar</button>
                            <button id="btn-confirm-borrar-no" style="padding:8px 24px;border-radius:7px;background:#223a6d;color:#fff;font-weight:700;border:none;cursor:pointer;">Cancelar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modalConfirm);
            modalConfirm.style.display = 'none';
        }
        btnBorrarNovedades.addEventListener('click', function() {
            modalConfirm.style.display = 'flex';
            const btnSi = document.getElementById('btn-confirm-borrar-si');
            const btnNo = document.getElementById('btn-confirm-borrar-no');
            btnNo.onclick = () => { modalConfirm.style.display = 'none'; };
            btnSi.onclick = async () => {
                modalConfirm.style.display = 'none';
                try {
                    const db = window.dbFirebaseHeart;
                    const ref = window.refFirebase;
                    const { remove } = await import('https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js');
                    await remove(ref(db, 'solucionadas'));
                    let aviso = document.createElement('div');
                    aviso.textContent = 'Novedades solucionadas borradas correctamente';
                    aviso.style.position = 'fixed';
                    aviso.style.top = '30px';
                    aviso.style.left = '50%';
                    aviso.style.transform = 'translateX(-50%)';
                    aviso.style.background = '#00e6ff';
                    aviso.style.color = '#1a2a4f';
                    aviso.style.fontWeight = 'bold';
                    aviso.style.padding = '14px 32px';
                    aviso.style.borderRadius = '12px';
                    aviso.style.boxShadow = '0 4px 24px #00e6ff55';
                    aviso.style.zIndex = '2000';
                    aviso.style.fontSize = '1.15rem';
                    document.body.appendChild(aviso);
                    setTimeout(()=>{ aviso.remove(); }, 1800);
                } catch (err) {
                    console.error('Error al borrar las novedades:', err);
                    alert('Error al borrar las novedades.');
                }
            };
        });
    }
});
</script>

<script>
// Hacer modal de edición de usuarios movible
document.addEventListener('DOMContentLoaded', function() {
    const modalUsuarios = document.querySelector('#modal-bg-usuarios .modal');
    const modalHeaderUsuarios = document.querySelector('#modal-bg-usuarios .modal-header');
    let offsetXUsuarios, offsetYUsuarios, isDraggingUsuarios = false;
    if (modalHeaderUsuarios && modalUsuarios) {
        modalHeaderUsuarios.addEventListener('mousedown', function(e) {
            isDraggingUsuarios = true;
            const rect = modalUsuarios.getBoundingClientRect();
            offsetXUsuarios = e.clientX - rect.left;
            offsetYUsuarios = e.clientY - rect.top;
            document.body.style.userSelect = 'none';
        });
        document.addEventListener('mousemove', function(e) {
            if (isDraggingUsuarios) {
                modalUsuarios.style.left = e.clientX - offsetXUsuarios + 'px';
                modalUsuarios.style.top = e.clientY - offsetYUsuarios + 'px';
                modalUsuarios.style.transform = 'none';
            }
        });
        document.addEventListener('mouseup', function() {
            isDraggingUsuarios = false;
            document.body.style.userSelect = '';
        });
        // Reset posición al abrir
        const btnEdicionUsuarios = document.getElementById('btn-edicion-usuarios');
        if (btnEdicionUsuarios) {
            btnEdicionUsuarios.addEventListener('click', () => {
                modalUsuarios.style.left = '';
                modalUsuarios.style.top = '';
                modalUsuarios.style.transform = '';
            });
        }
    }
});
</script>

            <script>
            // Lógica de copia de seguridad en Excel (no módulo)
            document.getElementById('btn-backup').addEventListener('click', async function() {
                const btnBackup = this;
                btnBackup.disabled = true;
                btnBackup.textContent = 'Generando...';
                try {
                    const db = window.dbFirebaseHeart;
                    const get = window.getFirebase;
                    const ref = window.refFirebase;
                    // Obtener datos de documentos
                    const snapshot = await get(ref(db, 'documentos'));
                    const docs = snapshot.val();
                    if (!docs) {
                        alert('No hay datos para exportar.');
                        btnBackup.disabled = false;
                        btnBackup.textContent = 'Copia de seguridad';
                        return;
                    }
                    const rows = [];
                    for (const docId in docs) {
                        const items = docs[docId];
                        for (const key in items) {
                            const item = items[key];
                            // Extraer solo la hora si item.hora tiene formato 'YYYY-MM-DD HH:mm:ss'
                            let soloHora = '';
                            if (item.hora && item.hora.includes(' ')) {
                                soloHora = item.hora.split(' ')[1];
                            } else {
                                soloHora = item.hora || '';
                            }
                            rows.push({
                                orden: docId,
                                fecha: item.fecha || '',
                                hora: soloHora,
                                proceso: item.proceso || '',
                                punto: item.punto || '',
                                usuario: item.usuario || ''
                            });
                        }
                    }
                    rows.sort((a, b) => (b.fecha + b.hora).localeCompare(a.fecha + a.hora));
                    // Cambiar encabezados: "Orden de produccion", quitar key
                    const ws = window.XLSX.utils.json_to_sheet(rows, {header: ['orden','fecha','hora','proceso','punto','usuario']});
                    // Renombrar encabezado de la primera columna
                    ws['A1'].v = 'Orden de produccion';
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, 'Registros');

                    // Obtener datos del nodo 'solucionadas' y crear hoja 'Historial de novedades'
                    let historialRows = [];
                    try {
                        const snapshotSol = await get(ref(db, 'solucionadas'));
                        const solucionadas = snapshotSol.val();
                        if (solucionadas) {
                            for (const id in solucionadas) {
                                const item = solucionadas[id];
                                // Si hay comentarios, una fila por cada comentario
                                if (item.comentarios && Array.isArray(item.comentarios)) {
                                    for (const comentarioObj of item.comentarios) {
                                        historialRows.push({
                                            consecutivo: item.consecutivo || '',
                                            creado_en: item.creado_en || '',
                                            descripcion: item.descripcion || '',
                                            fecha: item.fecha || '',
                                            punto: item.punto || '',
                                            solucionada: item.solucionada === true ? 'Sí' : (item.solucionada === false ? 'No' : ''),
                                            solucionado_en: item.solucionado_en || '',
                                            comentario: comentarioObj.comentario || '',
                                            fecha_comentario: comentarioObj.fecha || ''
                                        });
                                    }
                                } else {
                                    // Sin comentarios
                                    historialRows.push({
                                        consecutivo: item.consecutivo || '',
                                        creado_en: item.creado_en || '',
                                        descripcion: item.descripcion || '',
                                        fecha: item.fecha || '',
                                        punto: item.punto || '',
                                        solucionada: item.solucionada === true ? 'Sí' : (item.solucionada === false ? 'No' : ''),
                                        solucionado_en: item.solucionado_en || '',
                                        comentario: '',
                                        fecha_comentario: ''
                                    });
                                }
                            }
                        }
                    } catch (e) {
                        // Si hay error, dejar la hoja vacía
                        historialRows = [];
                    }
                    // Si hay datos, crear hoja con encabezados
                    let wsHistorial;
                    if (historialRows.length > 0) {
                        // Eliminar las columnas no deseadas al crear el array final
                        const rowsFiltrados = historialRows.map(row => ({
                            consecutivo: row.consecutivo,
                            descripcion: row.descripcion,
                            fecha: row.fecha,
                            punto: row.punto,
                            comentario: row.comentario,
                            fecha_comentario: row.fecha_comentario
                        }));
                        wsHistorial = window.XLSX.utils.json_to_sheet(rowsFiltrados, {header: ['consecutivo','descripcion','fecha','punto','comentario','fecha_comentario']});
                        wsHistorial['A1'].v = 'Consecutivo';
                        wsHistorial['B1'].v = 'Descripción';
                        wsHistorial['C1'].v = 'Fecha';
                        wsHistorial['D1'].v = 'Punto';
                        wsHistorial['E1'].v = 'Comentario';
                        wsHistorial['F1'].v = 'Fecha comentario';
                    } else {
                        wsHistorial = window.XLSX.utils.aoa_to_sheet([
                            ['Consecutivo','Descripción','Fecha','Punto','Comentario','Fecha comentario']
                        ]);
                    }
                    window.XLSX.utils.book_append_sheet(wb, wsHistorial, 'Historial de novedades');

                    // Generar nombre con fecha actual
                    const fecha = new Date();
                    const yyyy = fecha.getFullYear();
                    const mm = String(fecha.getMonth() + 1).padStart(2, '0');
                    const dd = String(fecha.getDate()).padStart(2, '0');
                    const nombreArchivo = `Copia de seguridad (${yyyy}-${mm}-${dd}).xlsx`;
                    window.XLSX.writeFile(wb, nombreArchivo);
                } catch (err) {
                    alert('Error al generar la copia de seguridad.');
                }
                btnBackup.disabled = false;
                btnBackup.textContent = 'Copia de seguridad';
            });
            </script>

                <script>
                // Fondo animado de partículas (canvas)
                const canvas = document.getElementById('bg-particles');
                const ctx = canvas.getContext('2d');
                let particles = [];
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                function createParticles() {
                    particles = [];
                    for (let i = 0; i < 38; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            r: 1.2 + Math.random() * 2.8,
                            dx: -0.5 + Math.random(),
                            dy: -0.5 + Math.random(),
                            c: `rgba(0,230,255,${0.12 + Math.random() * 0.18})`
                        });
                    }
                }
                createParticles();
                function animateParticles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let p of particles) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
                        ctx.fillStyle = p.c;
                        ctx.shadowColor = '#00e6ff';
                        ctx.shadowBlur = 8;
                        ctx.fill();
                        p.x += p.dx * 0.5;
                        p.y += p.dy * 0.5;
                        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
                    }
                    requestAnimationFrame(animateParticles);
                }
                animateParticles();
                window.addEventListener('resize', createParticles);

<script type="module">

// Inicializar Firebase
const firebaseConfig = {
    apiKey: "AIzaSyDpEI31T9OBGepR-f1cb0QA7m2LYbeMOeI",
    authDomain: "heart-trazabilidad.firebaseapp.com",
    databaseURL: "https://heart-trazabilidad-default-rtdb.firebaseio.com",

const btnReiniciar = document.getElementById('btn-reiniciar');
const modalBg = document.getElementById('modal-bg');
const modal = document.getElementById('modal');
const modalClose = document.getElementById('modal-close');
const modalHeader = document.getElementById('modal-header');
const modalContent = document.getElementById('modal-content');

        modalAbierto = true;
        await cargarMeses();
    }
});
modalClose.addEventListener('click', cerrarModal);

    if (e.target === modalBg) cerrarModal();
});
function cerrarModal() {
    modalBg.classList.remove('active');
    modalAbierto = false;
    // Limpiar contenido
    mesesList.innerHTML = '';
    mesesMsg.textContent = '';
    mesesLoading.style.display = '';
    formMeses.style.display = 'none';

// Hacer modal movible
let offsetX, offsetY, isDragging = false;
modalHeader.addEventListener('mousedown', function(e) {
    isDragging = true;
    const rect = modal.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', function(e) {
    if (isDragging) {
        modal.style.left = e.clientX - offsetX + 'px';
        modal.style.top = e.clientY - offsetY + 'px';
        modal.style.transform = 'none';
    }
});
document.addEventListener('mouseup', function() {
    isDragging = false;
    document.body.style.userSelect = '';
});

// Lógica para cargar meses desde Firebase
async function cargarMeses() {
    mesesLoading.style.display = '';
    formMeses.style.display = 'none';
    mesesMsg.textContent = '';
    mesesList.innerHTML = '';
    try {
        const snapshot = await get(ref(db, 'documentos'));
        const docs = snapshot.val();
        if (!docs) {
            mesesLoading.textContent = 'No hay datos disponibles.';
            return;
        }
        // Agrupar por mes y año
        const mesesSet = new Set();
        for (const docId in docs) {
            const items = docs[docId];
            for (const key in items) {
                const item = items[key];
                if (item && item.fecha) {
                    const [anio, mes] = item.fecha.split('-');
                    mesesSet.add(`${mes}-${anio}`);
                }
            }
        }
        if (mesesSet.size === 0) {
            mesesLoading.textContent = 'No hay meses disponibles.';
            return;
        }
        // Ordenar meses descendente
        const mesesArr = Array.from(mesesSet).sort((a, b) => b.localeCompare(a));
        // Mapeo de número a nombre de mes
        const mesesNombres = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        mesesArr.forEach(mesAnio => {
            const [mes, anio] = mesAnio.split('-');
            const nombreMes = mesesNombres[parseInt(mes, 10) - 1] || mes;
            const label = document.createElement('label');
            label.style.display = 'block';
            label.style.cursor = 'pointer';
            label.innerHTML = `<input type="checkbox" name="meses" value="${mesAnio}" style="margin-right:8px;">${nombreMes} del ${anio}`;
            mesesList.appendChild(label);
        });
        mesesLoading.style.display = 'none';
        formMeses.style.display = 'flex';
    } catch (err) {
        mesesLoading.textContent = 'Error al cargar los datos.';
    }
}

// Borrar meses seleccionados
formMeses.addEventListener('submit', async function(e) {
    e.preventDefault();
    const seleccionados = Array.from(formMeses.elements['meses'])
        .filter(cb => cb.checked)
        .map(cb => cb.value);
    if (seleccionados.length === 0) {
        mesesMsg.textContent = 'Seleccione al menos un mes.';
        return;
    }
    mesesMsg.textContent = 'Eliminando datos...';
    try {
        const snapshot = await get(ref(db, 'documentos'));
        const docs = snapshot.val();
        let totalBorrados = 0;
        for (const docId in docs) {
            const items = docs[docId];
            for (const key in items) {
                const item = items[key];
                if (item && item.fecha) {
                    const [anio, mes] = item.fecha.split('-');
                    const mesAnio = `${mes}-${anio}`;
                    if (seleccionados.includes(mesAnio)) {
                        await remove(ref(db, `documentos/${docId}/${key}`));
                        totalBorrados++;
                    }
                }
            }
        }
        mesesMsg.textContent = `Datos eliminados correctamente (${totalBorrados} registros).`;
        await cargarMeses();
    } catch (err) {
        mesesMsg.textContent = 'Error al eliminar los datos.';
    }
});
