<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador | HEART</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(ellipse at 60% 40%, #223a6d 0%, #1a2a4f 60%, #0e1a33 100%);
        }
        #bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        .login-container {
            background: rgba(26, 42, 79, 0.78);
            border-radius: 32px;
            box-shadow: 0 12px 48px 0 #00e6ff33, 0 2px 0 #00e6ff88 inset, 0 1.5px 0 #fff1 inset;
            padding: 64px 80px 44px 80px;
            width: 600px;
            max-width: 98vw;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: box-shadow 0.3s, transform 0.3s;
            box-sizing: border-box;
            animation: fadeInUp 1.1s cubic-bezier(.23,1.01,.32,1) 0s;
            position: relative;
            z-index: 2;
            border: 1.5px solid #00e6ff33;
            backdrop-filter: blur(16px) saturate(1.2);
        }
        .login-container:hover {
            box-shadow: 0 18px 80px 0 #00e6ff44, 0 2px 0 #00e6ff inset;
            transform: translateY(-2px) scale(1.012);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 180px;
            max-width: 92vw;
            margin-bottom: 28px;
            display: block;
            filter: drop-shadow(0 4px 16px #00e6ff44) brightness(1.15);
            transition: filter 0.3s;
        }
        .logo:hover {
            filter: drop-shadow(0 8px 32px #00e6ff99) brightness(1.25);
        }
        h2 {
            color: #00e6ff;
            margin-bottom: 36px;
            font-weight: 900;
            font-size: 2.3rem;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 2px 18px #00e6ff33, 0 1px 0 #fff2;
            position: relative;
        }
        h2::after {
            content: '';
            display: block;
            margin: 0 auto;
            margin-top: 8px;
            width: 80px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, #00e6ff 0%, #00bcd4 100%);
            box-shadow: 0 2px 12px #00e6ff55;
            animation: underlineAnim 2.2s cubic-bezier(.23,1.01,.32,1) infinite alternate;
        }
        @keyframes underlineAnim {
            from { width: 60px; }
            to { width: 120px; }
        }
        label {
            color: #e0e6f0;
            font-size: 1.08rem;
            margin-bottom: 7px;
            align-self: flex-start;
            font-weight: 500;
        }
        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 26px;
            box-sizing: border-box;
        }
        .input-group input {
            width: 100%;
            padding: 13px 44px 13px 18px;
            border-radius: 12px;
            border: 2px solid #223a6d;
            background: rgba(34, 58, 109, 0.82);
            color: #fff;
            font-size: 1.13rem;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            box-sizing: border-box;
            backdrop-filter: blur(2.5px);
        }
        .input-group input:focus {
            outline: none;
            border-color: #00e6ff;
            background: rgba(34, 58, 109, 0.98);
            box-shadow: 0 0 0 2px #00e6ff55, 0 0 8px #00e6ff44;
        }
        .input-group .icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #00e6ff;
            font-size: 1.25rem;
            opacity: 0.92;
            pointer-events: none;
            transition: color 0.2s, filter 0.2s;
        }
        .input-group input:focus ~ .icon {
            color: #fff;
            filter: drop-shadow(0 0 8px #00e6ff);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(90deg, #00e6ff 0%, #00bcd4 100%);
            color: #1a2a4f;
            border: none;
            border-radius: 12px;
            padding: 17px;
            font-size: 1.22rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 14px;
            box-shadow: 0 4px 18px 0 #00e6ff33, 0 1.5px 0 #00e6ff44 inset;
            transition: background 0.22s, transform 0.18s, box-shadow 0.22s, color 0.18s;
            letter-spacing: 1px;
            text-shadow: 0 1px 8px #00e6ff33;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .login-btn svg {
            width: 26px;
            height: 26px;
            margin-right: 6px;
            filter: drop-shadow(0 0 8px #00e6ff88);
            transition: transform 0.22s;
        }
        .login-btn:hover {
            background: linear-gradient(90deg, #00bcd4 0%, #00e6ff 100%);
            transform: translateY(-2px) scale(1.035);
            box-shadow: 0 8px 32px 0 #00e6ff66, 0 2px 0 #00e6ff99 inset;
            color: #0e1a33;
        }
        .login-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px #00e6ff55;
        }
        .login-btn:focus {
            outline: 2px solid #00e6ff;
            outline-offset: 2px;
        }
        .login-btn:hover svg {
            transform: scale(1.18) rotate(-8deg);
        }
        .error {
            color: #ff5252;
            margin-bottom: 14px;
            font-size: 1.08rem;
            text-align: center;
            text-shadow: 0 1px 8px #ff525244;
        }
        @media (max-width: 900px) {
            .login-container {
                width: 99vw;
                min-width: unset;
                padding: 24px 2vw 18px 2vw;
            }
            .logo {
                width: 120px;
            }
        }
    </style>
    <!-- Firebase Modular SDK v9+ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDpEI31T9OBGepR-f1cb0QA7m2LYbeMOeI",
            authDomain: "heart-trazabilidad.firebaseapp.com",
            databaseURL: "https://heart-trazabilidad-default-rtdb.firebaseio.com",
            projectId: "heart-trazabilidad",
            storageBucket: "heart-trazabilidad.appspot.com",
            messagingSenderId: "512817901403",
            appId: "1:512817901403:web:d0e99c14464455561cb47e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            try {
                const snapshot = await get(ref(db, 'Admin'));
                const admin = snapshot.val();
                if (admin && usuario === admin.usuario && contrasena === admin.contrasena) {
                    window.location.href = 'admin.html';
                } else {
                    mostrarError('Usuario o contraseña incorrectos.');
                }
            } catch (err) {
                mostrarError('Error al conectar con Firebase.');
            }
        });
        function mostrarError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }
    </script>
</head>
<body>
    <canvas id="bg-particles"></canvas>
    <div class="login-container">
        <img src="log.png" alt="Logo HEART" class="logo">
        <h2>Acceso Administrador</h2>
        <div id="error" class="error" style="display:none;"></div>
        <form id="loginForm" autocomplete="on" style="width:100%;">
            <label for="usuario">Usuario</label>
            <div class="input-group">
                <input type="text" id="usuario" name="usuario" required autocomplete="username" placeholder="Usuario">
                <span class="icon">
                    <svg width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="7.5" r="4.5" stroke="#00e6ff" stroke-width="2"/><path d="M3 19c0-3.866 3.582-7 8-7s8 3.134 8 7" stroke="#00e6ff" stroke-width="2"/></svg>
                </span>
            </div>
            <label for="contrasena">Contraseña</label>
            <div class="input-group">
                <input type="password" id="contrasena" name="contrasena" required autocomplete="current-password" placeholder="Contraseña">
                <span class="icon">
                    <svg width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="9" width="14" height="8" rx="2" stroke="#00e6ff" stroke-width="2"/><path d="M7 9V7a4 4 0 118 0v2" stroke="#00e6ff" stroke-width="2"/></svg>
                </span>
            </div>
            <button type="submit" class="login-btn">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#1a2a4f" stroke-width="2" stroke-linecap="round"/></svg>
                Ingresar
            </button>
        </form>
    </div>
    <script>
    // Fondo animado de partículas (canvas)
    const canvas = document.getElementById('bg-particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    function createParticles() {
        particles = [];
        for (let i = 0; i < 36; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: 1.2 + Math.random() * 2.8,
                dx: -0.5 + Math.random(),
                dy: -0.5 + Math.random(),
                c: `rgba(0,230,255,${0.12 + Math.random() * 0.18})`
            });
        }
    }
    createParticles();
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
            ctx.fillStyle = p.c;
            ctx.shadowColor = '#00e6ff';
            ctx.shadowBlur = 8;
            ctx.fill();
            p.x += p.dx * 0.5;
            p.y += p.dy * 0.5;
            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener('resize', createParticles);
    </script>
</body>
</html>
